<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table
      cellpadding="0"
      cellspacing="0"
      border="0"
      role="presentation"
      style="
        border-collapse: collapse;
        font-family: Arial, Helvetica, sans-serif;
        padding: 20px;
      "
    >
      <tr>
        <!-- PROFILE PHOTO -->
        <td valign="top" style="padding-right: 20px">
          <img
            src="https://magbool.github.io/email-signature/AHM.jpeg"
            alt="Ahmed Mohamed"
            width="100"
            height="100"
            style="
              display: block;
              width: 100px;
              height: 100px;
              border-radius: 50%;
              -ms-interpolation-mode: bicubic;
              border: 0;
              outline: none;
              text-decoration: none;
            "
          />
        </td>

        <!-- VERTICAL SEPARATOR LINE -->
        <td
          valign="top"
          width="1"
          style="
            background-color: #424242;
            width: 1px;
            line-height: 1px;
            font-size: 1px;
          "
          bgcolor="#424242"
        >
          <!--[if mso]>&nbsp;<![endif]-->
        </td>

        <!-- TEXT CONTENT -->
        <td
          valign="top"
          style="
            padding-left: 20px;
            font-family: Arial, Helvetica, sans-serif;
            color: #222222;
          "
        >
          <table
            cellpadding="0"
            cellspacing="0"
            border="0"
            role="presentation"
            height="100"
            style="border-collapse: collapse; height: 100px"
          >
            <!-- Name -->
            <tr>
              <td
                style="
                  font-family: Arial, Helvetica, sans-serif;
                  font-size: 22px;
                  font-weight: bold;
                  color: #424242;
                  line-height: 1.2;
                  padding-bottom: 8px;
                "
              >
                Ahmed Mohamed
              </td>
            </tr>
            <!-- Title -->
            <tr>
              <td
                style="
                  font-family: Arial, Helvetica, sans-serif;
                  font-size: 16px;
                  color: #424242;
                  line-height: 1.25;
                  padding-bottom: 18px;
                "
              >
                CS Student | Student Researcher,
                Department of Computer Science and Engineering Technology
              </td>
            </tr>
            <!-- Phone -->
            <tr>
              <td
                style="
                  font-family: Arial, Helvetica, sans-serif;
                  font-size: 14px;
                  color: #424242;
                  line-height: 1.3;
                  padding-bottom: 0;
                "
              >
                <a
                  href="tel:+14437369207"
                  style="color: #424242; text-decoration: none"
                  >+1 443 736 9207</a
                >
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
